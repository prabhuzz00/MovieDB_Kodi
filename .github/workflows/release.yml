name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build addon zip
        run: |
          ADDON_ID="plugin.video.moviedb"
          mkdir -p dist/${ADDON_ID}
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='dist' \
            . dist/${ADDON_ID}/
          cd dist
          zip -r ../${ADDON_ID}.zip ${ADDON_ID}/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: plugin.video.moviedb.zip
          generate_release_notes: true
